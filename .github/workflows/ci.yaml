name: CI - Build, Scan, Push

on:
  workflow_dispatch:
permissions:
  issues: write
  contents: write
  pull-requests: write
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: 7002370412/news-feed:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # - name: Install Podman
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y podman

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Maven project
      run: |
        cd news-feed
        mvn clean package -DskipTests

    # 5️⃣ Log in to Docker Hub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build Docker image
      run: |
        docker build  -f Dockerfile1 -t $DOCKER_IMAGE .

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      # with:
      #   image-ref: ${{ env.DOCKER_IMAGE }}
      #   format: table
      #   exit-code: 0 # fail workflow if vulnerabilities found
      with:
          scan-type: image
          image-ref: ${{ env.DOCKER_IMAGE }}
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL


    - name: Run AI Analyzer Action
      uses: Tombas287/ai-security-analyzer@main
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        google_api_key: ${{ secrets.GOOGLE_API_KEY }}
        report_path: trivy-report.json
        
    - name: Setup GitHub CLI
      run: |
          sudo apt-get update
          sudo apt-get install gh -y

    - name: Authenticate gh
      run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

    - name: Run script
      run: python script.py
      env:
        GITHUB_WORKSPACE: ${{ github.workspace }}
          
    # - name: Push Docker image
    #   run: docker push $DOCKER_IMAGE

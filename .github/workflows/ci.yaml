name: CI - Build, Scan, Push

on:
  workflow_dispatch:
    
jobs:
  build-and-push:
    runs-on: self-hosted
    env:
      DOCKER_IMAGE: 7002370412/news-feed:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Maven project
      run: |
        cd news-feed
        mvn clean package -DskipTests

    - name: Log in to Docker Hub with Podman
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | podman login docker.io \
          --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build Docker image
      run: |
        cd news-feed
        podman build -t $DOCKER_IMAGE .

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: $DOCKER_IMAGE
        format: table
        exit-code: 0 # fail workflow if vulnerabilities found

    - name: Push Docker image
      run: podman push $DOCKER_IMAGE
